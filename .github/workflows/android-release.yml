name: NexApp Official Clean Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node environment
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Extract Assets and Prepare Web Folder
        run: |
          # Clean old folders
          rm -rf www android
          mkdir -p www
          
          # Unzip the main asset file if exists
          if [ -f "NexApp-Crystal-Fruit-Full.zip" ]; then
            echo "Extracting game assets from ZIP..."
            unzip -o NexApp-Crystal-Fruit-Full.zip -d www/
          fi
          
          # Copy loose images and web files from root to www
          cp -v *.png *.webp *.html *.js www/ || true
          
          # Copy direct directories if they exist
          for folder in assets scenes scripts systems entities config; do
            if [ -d "$folder" ]; then
              cp -rv "$folder" www/
            fi
          done

          echo "Workspace ready. Checking final size:"
          du -sh www/

      - name: Initialize Android Project
        run: |
          npm init -y
          npm install @capacitor/core@latest @capacitor/cli@latest @capacitor/android@latest
          npx cap init "Crystal Fruit" "com.nexapp.crystal" --web-dir www
          npx cap add android
          npx cap sync android

      - name: Setup Java Development Kit
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Compile Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Export Final APK
        uses: actions/upload-artifact@v4
        with:
          name: NexApp-Crystal-Fruit-V1
          path: android/app/build/outputs/apk/debug/app-debug.apk
