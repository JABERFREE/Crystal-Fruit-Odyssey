
name: NexApp Final Recovery

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Strategic Extraction
        run: |
          rm -rf android package.json www
          mkdir -p www
          
          # 1. فك الضغط في مجلد مؤقت
          if [ -f "NexApp-Crystal-Fruit-Full.zip" ]; then
            unzip -o NexApp-Crystal-Fruit-Full.zip -d temp_extract
          fi
          
          # 2. "البحث الذكي": البحث عن المجلد الذي يحتوي على index.html
          # ونقل كل محتوياته إلى www
          ROOT_DIR=$(find temp_extract -name "index.html" -exec dirname {} \;)
          echo "Found game root at: $ROOT_DIR"
          cp -rv $ROOT_DIR/* www/
          
          # 3. التأكد من وجود المجلدات الأساسية في www
          ls -R www/
          echo "FINAL SIZE CHECK:"
          du -sh www/

          # 4. بناء الأندرويد
          npm init -y
          npm install @capacitor/core@latest @capacitor/cli@latest @capacitor/android@latest
          npx cap init "Crystal Fruit" "com.nexapp.crystal" --web-dir www
          npx cap add android
          npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Export APK
        uses: actions/upload-artifact@v4
        with:
          name: NexApp-Crystal-Fruit-Final
          path: android/app/build/outputs/apk/debug/app-debug.apk
