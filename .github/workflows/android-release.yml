
name: NexApp Ultimate Builder (Auto-Clean)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clean Old Files
        run: |
          # هذا السطر هو "الممحاة" التي ستمسح المجلد القديم تلقائياً
          rm -rf android 
          echo "Old android folder removed successfully!"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Create Fresh Android Structure
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "Crystal Fruit Odyssey" "com.nexapp.crystal.fruit" --web-dir .
          npx cap add android

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Final Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Download Your APK
        uses: actions/upload-artifact@v4
        with:
          name: NexApp-Final-Game
          path: android/app/build/outputs/apk/debug/app-debug.apk
