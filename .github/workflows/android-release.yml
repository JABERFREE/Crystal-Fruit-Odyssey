
name: NexApp Final APK (WWW Edition)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Prepare Web Assets & Initialize Capacitor
        run: |
          # 1. تنظيف شامل
          rm -rf android package.json www
          
          # 2. إنشاء الهوية
          npm init -y
          
          # 3. إنشاء المجلد الذي تطلبه الأداة (www) ونقل الملفات إليه
          mkdir www
          cp -r index.html main.js config.js instant_db.md native-build-config.js www/ || true
          # نقل مجلد الصور/الأصول إذا وجد
          cp -r assets www/ || true
          
          # 4. تثبيت الأدوات
          npm install @capacitor/core @capacitor/cli @capacitor/android
          
          # 5. بناء هيكل الأندرويد باستخدام مجلد www الجديد
          npx cap init "Crystal Fruit Odyssey" "com.nexapp.crystal.fruit" --web-dir www
          npx cap add android
          npx cap copy android

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Final APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload NexApp APK
        uses: actions/upload-artifact@v4
        with:
          name: Crystal-Fruit-Final-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
