
name: NexApp Official Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Clean and Prepare Workspace
        run: |
          # Remove old artifacts to prevent recursion errors
          rm -rf www android
          mkdir -p www
          
          # Copy folders only if they exist in root
          for dir in assets scenes scripts systems entities config; do
            if [ -d "$dir" ]; then
              cp -rv "$dir" www/
            fi
          done
          
          # Copy individual core files
          cp -v index.html *.js *.md www/ || true
          
          echo "Workspace prepared. Final folder size:"
          du -sh www/

      - name: Initialize Capacitor
        run: |
          npm init -y
          npm install @capacitor/core@latest @capacitor/cli@latest @capacitor/android@latest
          npx cap init "Crystal Fruit" "com.nexapp.crystal" --web-dir www
          npx cap add android
          npx cap sync android

      - name: Setup Java JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Export APK File
        uses: actions/upload-artifact@v4
        with:
          name: NexApp-Crystal-Fruit-V1
          path: android/app/build/outputs/apk/debug/app-debug.apk
