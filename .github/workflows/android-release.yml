
name: NexApp Deep Search Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Hunt and Gather Assets
        run: |
          mkdir -p www
          
          # البحث عن مكان ملف index.html الحقيقي ونقل كل ما بجانبه إلى www
          REAL_PATH=$(find . -name "index.html" -not -path "./www/*" | head -n 1 | xargs dirname)
          echo "Found game files at: $REAL_PATH"
          
          if [ -n "$REAL_PATH" ]; then
            cp -rv $REAL_PATH/* www/
          else
            echo "Error: index.html not found anywhere!"
            exit 1
          fi
          
          echo "--- FINAL CHECK ---"
          du -sh www/
          ls www/

      - name: Build Android APK
        run: |
          npm init -y
          npm install @capacitor/core@latest @capacitor/cli@latest @capacitor/android@latest
          npx cap init "Crystal Fruit" "com.nexapp.crystal" --web-dir www
          rm -rf android
          npx cap add android
          npx cap sync android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Compile Final APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Export Working APK
        uses: actions/upload-artifact@v4
        with:
          name: NexApp-Real-Size-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
