name: NexApp Final Zip-Fix

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Unzip and Prepare Assets
        run: |
          # 1. تنظيف
          rm -rf android package.json www
          mkdir www
          
          # 2. فك ضغط ملف الكنز (الصور والملفات)
          if [ -f "NexApp-Crystal-Fruit-Full.zip" ]; then
            unzip -o NexApp-Crystal-Fruit-Full.zip
            echo "Zip extracted successfully!"
          fi
          
          # 3. نقل كل شيء إلى مجلد الويب www
          cp -v *.html *.js *.md www/ || true
          [ -d "assets" ] && cp -rv assets www/ || echo "No assets"
          [ -d "config" ] && cp -rv config www/ || echo "No config"
          [ -d "entities" ] && cp -rv entities www/ || echo "No entities"
          [ -d "scenes" ] && cp -rv scenes www/ || echo "No scenes"
          [ -d "scripts" ] && cp -rv scripts www/ || echo "No scripts"
          [ -d "systems" ] && cp -rv systems www/ || echo "No systems"
          [ -d "rosie" ] && cp -rv rosie www/ || echo "No rosie"

          # 4. بناء الأندرويد
          npm init -y
          npm install @capacitor/core@latest @capacitor/cli@latest @capacitor/android@latest
          npx cap init "Crystal Fruit Odyssey" "com.nexapp.crystal.fruit" --web-dir www
          npx cap add android
          npx cap sync android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build Full APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Export Working APK
        uses: actions/upload-artifact@v4
        with:
          name: NexApp-Crystal-Fruit-Final
          path: android/app/build/outputs/apk/debug/app-debug.apk
