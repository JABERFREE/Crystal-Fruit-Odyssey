
name: NexApp Master Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Prepare Game Assets
        run: |
          mkdir -p www
          # 1. إذا وجد مجلدات مفتوحة، ينسخها
          [ -d "assets" ] && cp -rv assets www/ || echo "No direct assets"
          [ -d "scenes" ] && cp -rv scenes www/ || echo "No direct scenes"
          [ -d "scripts" ] && cp -rv scripts www/ || echo "No direct scripts"
          [ -d "systems" ] && cp -rv systems www/ || echo "No direct systems"
          [ -d "entities" ] && cp -rv entities www/ || echo "No direct entities"
          
          # 2. إذا وجد ملف ZIP، يفكه وينسخ ما بداخله (للاحتياط)
          if [ -f "NexApp-Crystal-Fruit-Full.zip" ]; then
            unzip -o NexApp-Crystal-Fruit-Full.zip -d temp_zip
            cp -rv temp_zip/* www/ || true
          fi
          
          # 3. نسخ ملفات الويب الأساسية
          cp -v index.html main.js config.js www/ || true
          
          echo "Final size of game folder:"
          du -sh www/

      - name: Build Android APK
        run: |
          npm init -y
          npm install @capacitor/core@latest @capacitor/cli@latest @capacitor/android@latest
          npx cap init "Crystal Fruit" "com.nexapp.crystal" --web-dir www
          npx cap add android
          npx cap sync android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Compile Final APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Export Working APK
        uses: actions/upload-artifact@v4
        with:
          name: NexApp-Success-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
