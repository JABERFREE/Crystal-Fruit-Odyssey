name: NexApp Zero-to-APK (Final Fix)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Initialize Project & Install Capacitor
        run: |
          # 1. تنظيف شامل لأي ملفات قديمة تسبب تعليق
          rm -rf android package.json package-lock.json capacitor.config.json
          
          # 2. صناعة "الهوية" المفقودة من Rosebud (package.json)
          npm init -y
          
          # 3. تثبيت أدوات تحويل الويب إلى أندرويد
          npm install @capacitor/core @capacitor/cli @capacitor/android
          
          # 4. بناء هيكل الأندرويد لبراند NexApp
          npx cap init "Crystal Fruit Odyssey" "com.nexapp.crystal.fruit" --web-dir .
          npx cap add android

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Final APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload NexApp APK
        uses: actions/upload-artifact@v4
        with:
          name: Crystal-Fruit-Final-Release
          path: android/app/build/outputs/apk/debug/app-debug.apk
