
name: NexApp Ultimate Success

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Intelligent Workspace Preparation
        run: |
          # 1. Clean everything
          rm -rf www android
          mkdir -p www
          
          # 2. Find the REAL location of game files
          # We search for index.html wherever it is hidden
          GAME_DIR=$(find . -name "index.html" -not -path "*/www/*" -not -path "*/node_modules/*" | head -n 1 | xargs dirname)
          
          echo "Target detected at: $GAME_DIR"
          
          # 3. Copy everything from that location to www
          if [ -n "$GAME_DIR" ]; then
            cp -rv $GAME_DIR/* www/
          else
            echo "CRITICAL ERROR: No game files found!"
            exit 1
          fi
          
          # 4. Final Verification
          echo "Folder Check:"
          ls -R www/assets || echo "Assets folder still missing in www!"
          echo "Final size of build folder:"
          du -sh www/

      - name: Initialize and Build Android
        run: |
          npm init -y
          npm install @capacitor/core@latest @capacitor/cli@latest @capacitor/android@latest
          npx cap init "Crystal Fruit" "com.nexapp.crystal" --web-dir www
          npx cap add android
          npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Final APK Compilation
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Export High Volume APK
        uses: actions/upload-artifact@v4
        with:
          name: NexApp-Crystal-Fruit-Final
          path: android/app/build/outputs/apk/debug/app-debug.apk
