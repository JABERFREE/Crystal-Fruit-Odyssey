
name: NexApp Sniper Fix

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Extract and Force Move Assets
        run: |
          # 1. تنظيف وبناء المجلد الهدف
          rm -rf android package.json www
          mkdir -p www
          
          # 2. فك الضغط (إذا وجد الملف)
          if [ -f "NexApp-Crystal-Fruit-Full.zip" ]; then
            unzip -o NexApp-Crystal-Fruit-Full.zip -d temp_folder
            echo "Zip extracted to temp_folder"
          fi
          
          # 3. القنص (البحث عن المجلدات في أي مكان ونقل محتوياتها لـ www)
          # سنبحث عن المجلدات الأساسية وننقلها
          find . -type d -name "assets" -exec cp -rv {}/. www/assets/ \; || true
          find . -type d -name "config" -exec cp -rv {}/. www/config/ \; || true
          find . -type d -name "scenes" -exec cp -rv {}/. www/scenes/ \; || true
          find . -type d -name "scripts" -exec cp -rv {}/. www/scripts/ \; || true
          find . -type d -name "systems" -exec cp -rv {}/. www/systems/ \; || true
          
          # 4. نقل الملفات البرمجية الأساسية
          cp -v *.html *.js *.md www/ || true
          
          # 5. فحص الحجم النهائي لـ www (سيظهر في اللوج)
          echo "Final size of WWW folder:"
          du -sh www/

          # 6. بناء الأندرويد
          npm init -y
          npm install @capacitor/core@latest @capacitor/cli@latest @capacitor/android@latest
          npx cap init "Crystal Fruit Odyssey" "com.nexapp.crystal.fruit" --web-dir www
          npx cap add android
          npx cap sync android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build Massive APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Export Full APK
        uses: actions/upload-artifact@v4
        with:
          name: NexApp-Crystal-Fruit-Final
          path: android/app/build/outputs/apk/debug/app-debug.apk
