name: NexApp Final Bulletproof Builder

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Clean and Build Structure
        run: |
          # 1. تنظيف شامل ونهائي
          rm -rf android package.json www capacitor.config.json
          
          # 2. إنشاء الهوية وتثبيت الأدوات بشكل صريح
          npm init -y
          npm install @capacitor/core@latest @capacitor/cli@latest @capacitor/android@latest
          
          # 3. إنشاء المجلد المطلوب ونقل ملفات Rosebud
          mkdir www
          cp -v index.html main.js config.js instant_db.md native-build-config.js www/ || true
          cp -rv assets www/ || true
          
          # 4. بناء الهيكل (هنا السحر الحقيقي)
          npx cap init "Crystal Fruit Odyssey" "com.nexapp.crystal.fruit" --web-dir www
          npx cap add android
          npx cap sync android # هذه الخطوة هي التي تحل مشكلة الـ plugins المفقودة

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK File
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Export Final APK
        uses: actions/upload-artifact@v4
        with:
          name: NexApp-Crystal-Fruit-Success
          path: android/app/build/outputs/apk/debug/app-debug.apk
