name: NexApp Final Asset-Fix

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Locate and Copy All Files
        run: |
          rm -rf android package.json www
          npm init -y
          mkdir www
          
          # نسخ الملفات البرمجية الأساسية
          cp -v *.html *.js *.md www/ || true
          
          # البحث الذكي عن مجلد الصور (سواء كان assets أو Assets أو أي مجلد آخر)
          # سنقوم بنسخ أي مجلد يحتوي على صور لضمان عمل اللعبة
          find . -maxdepth 1 -type d -not -path '*/.*' -not -path './www' -not -path './node_modules' -exec cp -rv {} www/ \;

          npm install @capacitor/core@latest @capacitor/cli@latest @capacitor/android@latest
          npx cap init "Crystal Fruit Odyssey" "com.nexapp.crystal.fruit" --web-dir www
          npx cap add android
          npx cap sync android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build Final APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Export Working APK
        uses: actions/upload-artifact@v4
        with:
          name: NexApp-Crystal-Fruit-Full
          path: android/app/build/outputs/apk/debug/app-debug.apk
