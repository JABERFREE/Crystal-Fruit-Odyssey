name: Android Debug Build (Auto-Repair)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate & Build APK
        run: |
          cd android
          # إذا كان الملف مفقوداً، سنقوم بتوليده الآن
          if [ ! -f "gradlew" ]; then
            echo "Gradlew not found, generating it..."
            gradle wrapper
          fi
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NexApp-Crystal-Fruit-V1
          path: android/app/build/outputs/apk/debug/app-debug.apk
